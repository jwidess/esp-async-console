name: Publish to ESP Registry

on:
  push:
    branches: [ master ]

jobs:
  upload_components:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: espressif/upload-components-ci-action@v2
        with:
          components: "esp-async-console: ."
          namespace: "jwidess"
